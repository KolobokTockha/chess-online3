<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шахматы · Игра с другом</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .game-container {
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 2rem;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.9);
            border: 1px solid #444;
            max-width: 800px;
            width: 100%;
        }

        .game-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 0 10px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .game-title {
            font-size: 2rem;
            font-weight: 700;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
            font-family: 'Times New Roman', serif;
        }

        .back-btn {
            background: #333;
            border: 1px solid #444;
            color: #fff;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .back-btn:hover {
            background: #444;
            border-color: #ffd700;
            color: #ffd700;
        }

        .invite-btn {
            background: #ffd700;
            border: none;
            color: #000;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }

        .invite-btn:hover {
            background: #ffed4d;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        .invite-link-container {
            display: none;
            margin: 10px 0;
            padding: 15px;
            background: #222;
            border-radius: 30px;
            border: 1px solid #ffd700;
            align-items: center;
            gap: 10px;
        }

        .invite-link-container.show {
            display: flex;
        }

        .invite-link {
            flex: 1;
            padding: 10px;
            background: #333;
            border: 1px solid #444;
            border-radius: 20px;
            color: #ffd700;
            font-size: 0.9rem;
            word-break: break-all;
        }

        .copy-btn {
            background: #ffd700;
            border: none;
            color: #000;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .copy-btn:hover {
            background: #ffed4d;
        }

        .players-info {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
            padding: 15px;
            background: #222;
            border-radius: 50px;
        }

        .player {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 20px;
            border-radius: 30px;
            background: #333;
        }

        .player.white {
            border: 2px solid #ffd700;
        }

        .player.black {
            border: 2px solid #666;
        }

        .player-icon {
            font-size: 1.5rem;
        }

        .player-name {
            font-size: 1.2rem;
            font-weight: 500;
        }

        .player-turn {
            font-size: 0.9rem;
            color: #aaa;
        }

        .board-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        #board {
            width: 100%;
            max-width: 560px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 30px rgba(0,0,0,0.8);
        }

        .game-status {
            text-align: center;
            font-size: 1.3rem;
            margin: 20px 0;
            padding: 15px;
            background: #222;
            border-radius: 50px;
            border: 1px solid #444;
            color: #ffd700;
            font-weight: bold;
        }

        .move-history {
            background: #222;
            border-radius: 20px;
            padding: 15px;
            margin: 20px 0;
            max-height: 150px;
            overflow-y: auto;
        }

        .move-history h3 {
            color: #ffd700;
            margin-bottom: 10px;
        }

        .moves-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .move-item {
            background: #333;
            padding: 5px 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 1rem;
            border: 1px solid #444;
            color: #ffd700;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .action-btn {
            background: #333;
            border: 1px solid #444;
            color: #fff;
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .action-btn:hover {
            background: #444;
            border-color: #ffd700;
            color: #ffd700;
        }

        .turn-indicator {
            font-size: 1.5rem;
            color: #ffd700;
            text-align: center;
            margin: 10px 0;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #ffd700;
            color: #000;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            opacity: 0;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="toast" id="toast">Ссылка скопирована!</div>

    <div class="game-container">
        <div class="game-header">
            <span class="game-title">♔ Игра с другом</span>
            <div style="display: flex; gap: 10px;">
                <button class="invite-btn" id="inviteBtn">
                    <i class="fas fa-link"></i> Пригласить
                </button>
                <!-- ИСПРАВЛЕНО: меняем ссылку с meny.html на index.html -->
                <a href="index.html" class="back-btn">
                    <i class="fas fa-arrow-left"></i> Назад
                </a>
            </div>
        </div>

        <div class="invite-link-container" id="inviteLinkContainer">
            <input type="text" class="invite-link" id="inviteLink" readonly>
            <button class="copy-btn" id="copyBtn">
                <i class="fas fa-copy"></i> Копировать
            </button>
        </div>

        <div class="players-info">
            <div class="player white">
                <span class="player-icon">♔</span>
                <div>
                    <div class="player-name">Игрок 1 (белые)</div>
                    <div class="player-turn" id="whiteTurn">ваш ход</div>
                </div>
            </div>
            <div class="player black">
                <span class="player-icon">♚</span>
                <div>
                    <div class="player-name">Игрок 2 (черные)</div>
                    <div class="player-turn" id="blackTurn">ждет</div>
                </div>
            </div>
        </div>

        <div class="board-container">
            <div id="board"></div>
        </div>

        <div class="turn-indicator" id="turnIndicator">
            ⬇️ Ход белых ⬇️
        </div>

        <div class="game-status" id="status">
            Игрок 1 (белые) ходит
        </div>

        <div class="move-history">
            <h3><i class="fas fa-history"></i> История ходов</h3>
            <div class="moves-list" id="moveHistory"></div>
        </div>

        <div class="action-buttons">
            <button class="action-btn" id="newGameBtn">
                <i class="fas fa-rotate-right"></i> Новая игра
            </button>
            <button class="action-btn" id="resetOrientationBtn">
                <i class="fas fa-sync-alt"></i> Перевернуть доску
            </button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

    <script>
        $(document).ready(function() {
            console.log("Игра с другом загружена");
            
            // Инициализация игры
            var game = new Chess();
            var currentOrientation = 'white'; // white внизу, black вверху
            
            // Конфигурация доски
            var boardConfig = {
                draggable: true,
                position: 'start',
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
                onDragStart: onDragStart,
                onDrop: onDrop,
                onSnapEnd: onSnapEnd,
                orientation: 'white' // белые снизу
            };

            var board = Chessboard('board', boardConfig);
            
            // Обновление истории ходов
            function updateMoveHistory() {
                var history = game.history();
                var movesList = $('#moveHistory');
                movesList.empty();
                
                for (var i = 0; i < history.length; i++) {
                    var moveItem = $('<span>').addClass('move-item').text((i + 1) + '. ' + history[i]);
                    movesList.append(moveItem);
                }
            }
            
            // Обновление статуса
            function updateStatus() {
                var status = '';
                var turnText = game.turn() === 'w' ? 'белых' : 'черных';
                var playerNum = game.turn() === 'w' ? '1' : '2';
                
                if (game.game_over()) {
                    if (game.in_checkmate()) {
                        var winner = game.turn() === 'w' ? 'Черные' : 'Белые';
                        status = 'Мат! ' + winner + ' победили!';
                        $('#turnIndicator').text('🏆 ' + winner + ' выиграли! 🏆');
                    } else if (game.in_stalemate()) {
                        status = 'Пат! Ничья';
                        $('#turnIndicator').text('🤝 Ничья 🤝');
                    } else {
                        status = 'Игра окончена';
                        $('#turnIndicator').text('⏸️ Игра окончена ⏸️');
                    }
                } else {
                    status = 'Игрок ' + playerNum + ' (' + turnText + ') ходит';
                    $('#turnIndicator').html((game.turn() === 'w' ? '⬇️ ' : '⬆️ ') + 'Ход ' + turnText + (game.turn() === 'w' ? ' ⬇️' : ' ⬆️'));
                    
                    if (game.in_check()) {
                        status += ' (ШАХ!)';
                        $('#turnIndicator').append(' ⚠️ ШАХ ⚠️');
                    }
                }
                
                $('#status').text(status);
                $('#whiteTurn').text(game.turn() === 'w' ? 'ходит' : 'ждет');
                $('#blackTurn').text(game.turn() === 'b' ? 'ходит' : 'ждет');
            }
            
            // События перетаскивания
            function onDragStart(source, piece, position, orientation) {
                if (game.game_over()) return false;
                
                // Проверяем, что игрок двигает фигуры своего цвета
                if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                    (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                    return false;
                }
                
                return true;
            }
            
            function onDrop(source, target) {
                if (game.game_over()) return 'snapback';

                var move = game.move({
                    from: source,
                    to: target,
                    promotion: 'q' // Всегда превращаем в ферзя для простоты
                });

                if (move === null) return 'snapback';

                updateMoveHistory();
                updateStatus();
            }
            
            function onSnapEnd() {
                board.position(game.fen());
            }
            
            // Новая игра
            function resetGame() {
                game.reset();
                board.start();
                updateMoveHistory();
                updateStatus();
            }
            
            // Переворот доски
            function toggleOrientation() {
                currentOrientation = currentOrientation === 'white' ? 'black' : 'white';
                board.orientation(currentOrientation);
                
                // Показываем подсказку
                showToast('Доска перевернута');
            }
            
            // Функция копирования ссылки
            function copyInviteLink() {
                var currentUrl = window.location.href;
                var inviteLink = document.getElementById('inviteLink');
                inviteLink.value = currentUrl;
                
                // Копируем в буфер обмена
                inviteLink.select();
                document.execCommand('copy');
                
                showToast('Ссылка скопирована! Отправьте другу');
            }
            
            // Показать/скрыть контейнер со ссылкой
            function toggleInviteLink() {
                var container = document.getElementById('inviteLinkContainer');
                container.classList.toggle('show');
                
                if (container.classList.contains('show')) {
                    var currentUrl = window.location.href;
                    document.getElementById('inviteLink').value = currentUrl;
                }
            }
            
            // Показать всплывающее сообщение
            function showToast(message) {
                var toast = document.getElementById('toast');
                toast.textContent = message;
                toast.classList.add('show');
                
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            }
            
            // Обработчики кнопок
            $('#inviteBtn').click(toggleInviteLink);
            $('#copyBtn').click(copyInviteLink);
            $('#newGameBtn').click(resetGame);
            $('#resetOrientationBtn').click(toggleOrientation);
            
            $(window).resize(function() {
                board.resize();
            });
            
            // Старт
            updateStatus();
        });
    </script>
</body>
</html>
